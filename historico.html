<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>NewEnergy | Histórico Analítico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0f1b; --card: #161b2d; --accent: #00d2ff; --text: #fff; 
            --danger: #ff4757; --border: rgba(255,255,255,0.05);
        }
        body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); padding:20px; }
        .container { max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .chart-container { height: 300px; margin-bottom: 20px; }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px; }
        .tab { flex:1; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .tab.active { background: var(--accent); color: #0b0f1b; }

        .log-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .log-item:last-child { border: none; }
        .alert-row { color: var(--danger); font-weight: bold; }
        
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: #0b0f1b; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 id="deviceTitle" style="margin:0; font-size: 20px;">Carregando Relatório...</h1>
            <p style="font-size: 12px; color: #8fa3c6;">Histórico de telemetria NewEnergy</p>
        </div>
        <a href="painel.html" class="btn" style="background: rgba(255,255,255,0.1); color: #fff;">Sair</a>
    </div>

    <div class="tab-menu">
        <div class="tab active" onclick="changePeriod('diario', this)">DIÁRIO</div>
        <div class="tab" onclick="changePeriod('semanal', this)">SEMANAL</div>
        <div class="tab" onclick="changePeriod('mensal', this)">MENSAL</div>
    </div>

    <div class="card">
        <div class="chart-container">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size: 16px;">Registros Recentes</h3>
        <div id="logList">Buscando dados no servidor...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
    authDomain: "telemetriasut1.firebaseapp.com",
    databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
    projectId: "telemetriasut1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// PEGA ID DO SENSOR DA URL
const idSensor = new URLSearchParams(window.location.search).get('id');
document.getElementById("deviceTitle").innerText = "Logs: " + idSensor;

let historyChart;
let limites = { tMin: 10, tMax: 40 };

// Carregar limites de alerta para marcar em vermelho no histórico
db.ref(`config_alertas/${idSensor}`).on('value', s => {
    if(s.exists()) limites = s.val();
});

function initChart(labels, tempData, humData) {
    const ctx = document.getElementById('historyChart').getContext('2d');
    if(historyChart) historyChart.destroy();
    
    historyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Temp (°C)', data: tempData, borderColor: '#ff4757', tension: 0.3, fill: false },
                { label: 'Hum (%)', data: humData, borderColor: '#00d2ff', tension: 0.3, fill: false }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#fff' } } },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#fff' } },
                x: { grid: { display: false }, ticks: { color: '#fff' } }
            }
        }
    });
}

function fetchData(periodo) {
    // Busca na subpasta do sensor selecionado
    db.ref(`historico/${idSensor}/${periodo}`).limitToLast(50).on('value', snap => {
        const listDiv = document.getElementById("logList");
        listDiv.innerHTML = "";
        
        let labels = [];
        let temps = [];
        let hums = [];

        if(!snap.exists()) {
            listDiv.innerHTML = "Nenhum dado registrado para este período.";
            return;
        }

        snap.forEach(child => {
            const val = child.val();
            const time = val.hora || new Date(parseInt(child.key) * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const dataStr = val.data || "";

            labels.push(time);
            temps.push(val.temp);
            hums.push(val.hum);

            // Verifica se está fora dos limites para pintar de vermelho
            const isAlert = (val.temp > limites.tMax || val.temp < limites.tMin);
            
            listDiv.innerHTML += `
                <div class="log-item ${isAlert ? 'alert-row' : ''}">
                    <span>${dataStr} ${time}</span>
                    <span>${val.temp}°C / ${val.hum}%</span>
                </div>
            `;
        });

        initChart(labels, temps, hums);
    });
}

function changePeriod(p, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    fetchData(p);
}

// Inicia carregando o histórico diário
if(idSensor) {
    fetchData('diario');
} else {
    window.location.href = 'painel.html';
}
</script>
</body>
</html>
