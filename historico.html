<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico | NewEnergy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f1b; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .card { background: #161b2d; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid rgba(255,255,255,0.05); }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2e374a; }
    </style>
</head>
<body>
    <div class="card">
        <a href="painel.html" style="color: #00d2ff; text-decoration: none; font-weight: bold;">< Voltar</a>
        <h2 id="title">Relatório</h2>
        <div id="dados">Buscando histórico...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
            authDomain: "telemetriasut1.firebaseapp.com",
            databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
            projectId: "telemetriasut1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const id = new URLSearchParams(window.location.search).get('id');

        if(id) {
            document.getElementById("title").innerText = "Logs: " + id;
            db.ref(`historico/${id}`).limitToLast(30).on('value', snap => {
                const div = document.getElementById("dados");
                div.innerHTML = "";
                snap.forEach(child => {
                    const v = child.val();
                    div.innerHTML += `<div class="row"><span>${v.data || 'Hoje'}</span><strong>${v.temp}°C / ${v.hum}%</strong></div>`;
                });
            });
        }
    </script>
</body>
</html>
