<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NewEnergy | Histórico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f1b; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .card { background: #161b2d; padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; border: 1px solid rgba(255,255,255,0.05); }
        .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2e374a; }
        .btn-back { background: none; border: none; color: #00d2ff; cursor: pointer; font-weight: bold; margin-bottom: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <button class="btn-back" onclick="window.history.back()">← Voltar</button>
        <h2 id="sTitle" style="margin-top:0">Dados de Histórico</h2>
        <div id="lista">Carregando telemetria...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
            authDomain: "telemetriasut1.firebaseapp.com",
            databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
            projectId: "telemetriasut1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const id = new URLSearchParams(window.location.search).get('id');
        if(id) {
            document.getElementById("sTitle").innerText = "Logs: " + id;
            db.ref(`historico/${id}`).limitToLast(40).on('value', snap => {
                const list = document.getElementById("lista");
                list.innerHTML = "";
                snap.forEach(child => {
                    const v = child.val();
                    list.innerHTML += `<div class="item"><span>${v.data || 'Log'}</span><strong>${v.temp}°C / ${v.hum}%</strong></div>`;
                });
            });
        }
    </script>
</body>
</html>
