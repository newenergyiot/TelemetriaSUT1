<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NewEnergy | Monitor Pro Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    /* Reaproveitando seu CSS Original */
    :root { --brand-primary: #1a365d; --brand-accent: #007aff; --bg-body: #f1f5f9; --card-bg: #ffffff; --on: #10b981; --off: #e11d48; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: var(--card-bg); border-radius: 20px; padding: 35px; width: 100%; max-width: 440px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; position: relative; }
    .gauges-container { display: flex; gap: 15px; margin-bottom: 25px; }
    .gauge-box { flex: 1; background: #f8fafc; padding: 20px 10px; border-radius: 16px; border: 1px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; }
    .g-value { font-size: 24px; font-weight: 700; color: var(--brand-primary); }
    .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
    .btn-led.on { background: var(--brand-primary); color: #fff; }
    .btn-led.off { background: #e2e8f0; color: #1e293b; }
    #adminPanel { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; border-radius: 20px; padding: 30px; box-sizing: border-box; z-index: 100; flex-direction: column; overflow-y: auto; text-align: left; }
    .admin-input { background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 15px; }
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>
<div class="card">
  <div id="adminPanel">
    <div style="font-weight: 800; color: var(--brand-accent); margin-bottom: 20px;">Configurações do Dispositivo</div>
    <label style="font-size: 10px; font-weight: bold;">LIMITES DE TEMPERATURA</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <input type="number" id="tMin" class="admin-input" placeholder="Mín">
      <input type="number" id="tMax" class="admin-input" placeholder="Máx">
    </div>
    <label style="font-size: 10px; font-weight: bold;">E-MAIL DE ALERTA</label>
    <input type="email" id="cfgEmail" class="admin-input">
    
    <button class="btn-action" style="background:var(--brand-primary); color:#fff;" onclick="salvarConfig()">SALVAR</button>
    <button class="btn-action" style="background:transparent; border:1px solid #ddd" onclick="fecharAdmin()">FECHAR</button>
  </div>

  <div class="header-main" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div id="logoAdmin" style="font-weight: 800; color: var(--brand-primary); cursor:pointer">NewEnergy IoT</div>
    <button onclick="location.href='painel.html'" style="font-size:10px; border:none; background:#eee; padding:5px 10px; border-radius:5px; cursor:pointer">VOLTAR</button>
  </div>

  <div class="gauges-container">
    <div class="gauge-box">
      <div style="font-size:10px; color:#64748b">TEMPERATURA</div>
      <canvas id="gTemp"></canvas>
      <div id="tempVal" class="g-value">--°C</div>
    </div>
    <div class="gauge-box">
      <div style="font-size:10px; color:#64748b">UMIDADE</div>
      <canvas id="gHum"></canvas>
      <div id="humVal" class="g-value">--%</div>
    </div>
  </div>

  <div id="alertMessage" style="color:red; font-weight:bold; margin-bottom:10px; font-size:12px;"></div>

  <button id="btnLED" class="btn-action btn-led off">CARREGANDO LED...</button>
  <button class="btn-action" style="background:white; color:var(--brand-accent); border:1.5px solid var(--brand-accent)" 
          onclick="abrirHistorico()">RELATÓRIOS DE PERFORMANCE</button>
</div>

<script>
// PEGA O ID DO SENSOR DA URL
const idSensor = new URLSearchParams(window.location.search).get('id');
if(!idSensor) window.location.href = "painel.html";

firebase.initializeApp({
    apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
    authDomain: "telemetriasut1.firebaseapp.com",
    databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
    projectId: "telemetriasut1"
});

const db = firebase.database();
let config = { tMin: 10, tMax: 40, emailDestino: "" };
let gT, gH;

// INICIALIZA GAUGES
function initGauges() {
    const opt = (col) => ({ angle: 0.15, lineWidth: 0.2, pointer: { length: 0.5, color: '#1a365d' }, colorStart: col, colorStop: col, strokeColor: '#e2e8f0' });
    gT = new Gauge(document.getElementById("gTemp")).setOptions(opt('#e11d48'));
    gT.maxValue = 60; gT.setMinValue(-10); gT.set(0);
    gH = new Gauge(document.getElementById("gHum")).setOptions(opt('#007aff'));
    gH.maxValue = 100; gH.setMinValue(0); gH.set(0);
}

// SINCRONIZA DADOS DO SENSOR ESPECÍFICO
function startSync() {
    // Escuta Dados em Tempo Real
    db.ref(`sensores/${idSensor}`).on("value", snap => {
        const data = snap.val();
        if(!data) return;
        gT.set(data.temp || 0);
        gH.set(data.hum || 0);
        document.getElementById("tempVal").innerText = (data.temp || 0) + "°C";
        document.getElementById("humVal").innerText = (data.hum || 0) + "%";
        analisarAlertas(data.temp, data.hum);
    });

    // Escuta LED
    db.ref(`sensores/${idSensor}/led`).on("value", s => {
        const on = s.val() == 1;
        const b = document.getElementById("btnLED");
        b.innerText = on ? "DESLIGAR ILUMINAÇÃO" : "LIGAR ILUMINAÇÃO";
        b.className = "btn-action btn-led " + (on ? "on" : "off");
    });

    // Escuta Configurações de Alerta deste Sensor
    db.ref(`config_alertas/${idSensor}`).on("value", s => {
        if(s.exists()) config = s.val();
    });
}

function analisarAlertas(t, h) {
    const erro = (t > config.tMax || t < config.tMin);
    document.getElementById("alertMessage").innerText = erro ? "⚠️ PARÂMETROS FORA DA NORMA" : "";
}

// AÇÃO DO LED
document.getElementById("btnLED").onclick = () => {
    db.ref(`sensores/${idSensor}/led`).get().then(s => {
        db.ref(`sensores/${idSensor}/led`).set(s.val() == 1 ? 0 : 1);
    });
};

// ACESSO AO ADMIN (5 CLIQUES NO LOGO)
let cliques = 0;
document.getElementById("logoAdmin").onclick = () => {
    if(++cliques >= 5) {
        document.getElementById("adminPanel").style.display = "flex";
        document.getElementById("tMin").value = config.tMin;
        document.getElementById("tMax").value = config.tMax;
        document.getElementById("cfgEmail").value = config.emailDestino;
        cliques = 0;
    }
};

function salvarConfig() {
    const up = {
        tMin: parseFloat(document.getElementById("tMin").value),
        tMax: parseFloat(document.getElementById("tMax").value),
        emailDestino: document.getElementById("cfgEmail").value
    };
    db.ref(`config_alertas/${idSensor}`).update(up).then(() => {
        alert("Configurações Salvas!");
        fecharAdmin();
    });
}

function fecharAdmin() { document.getElementById("adminPanel").style.display = "none"; }
function abrirHistorico() { window.location.href = `historico.html?id=${idSensor}`; }

initGauges();
startSync();
</script>
</body>
</html>
