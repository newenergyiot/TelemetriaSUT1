<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NewEnergy | Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0b0f1b; --card:#161b2d; --accent:#00d2ff; --text:#fff; }
        body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:center; height:100vh; }
        .card { background: var(--card); border-radius: 20px; padding: 40px; width: 320px; text-align: center; }
        .val { font-size: 48px; font-weight: 800; color: var(--accent); margin: 20px 0; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: 1.5px solid var(--accent); background: transparent; color: var(--accent); font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="display:flex; justify-content: space-between; font-size: 12px;">
            <a href="painel.html" style="color:var(--accent); text-decoration:none;">< Voltar</a>
            <span id="sensorID">--</span>
        </div>
        <h2 id="sensorNome">Carregando...</h2>
        <div id="displayVal" class="val">--°C</div>
        <div id="humVal" style="font-size: 18px; margin-bottom: 20px;">--% Humidade</div>
        <button class="btn" onclick="abrirHistorico()">VER HISTÓRICO</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
            authDomain: "telemetriasut1.firebaseapp.com",
            databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
            projectId: "telemetriasut1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const id = new URLSearchParams(window.location.search).get('id');

        if(!id) window.location.href = "painel.html";
        document.getElementById("sensorID").innerText = id;

        db.ref(`sensores/${id}`).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            document.getElementById("sensorNome").innerText = data.nome || id;
            document.getElementById("displayVal").innerText = (data.temp || 0) + "°C";
            document.getElementById("humVal").innerText = (data.hum || 0) + "% Umidade";
        });

        function abrirHistorico() { window.location.href = `historico.html?id=${id}`; }
    </script>
</body>
</html>
