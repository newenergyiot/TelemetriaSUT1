<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>NewEnergy | Login Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1b; --card: #161b2d; --accent: #00d2ff; --text: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: var(--card); border-radius: 24px; padding: 40px; width: 100%; max-width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #2e374a; background: #0b0f1b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #0b0f1b; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        #msg { color: #ff4757; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="margin:0">NewEnergy</h1>
        <p style="color: #8fa3c6;">Monitoramento Industrial</p>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">Entrar no Sistema</button>
        <div id="msg"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
            authDomain: "telemetriasut1.firebaseapp.com",
            databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
            projectId: "telemetriasut1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => { if(user) window.location.href = "painel.html"; });

        function login() {
            const e = document.getElementById("email").value;
            const p = document.getElementById("pass").value;
            auth.signInWithEmailAndPassword(e, p).catch(err => {
                const m = document.getElementById("msg");
                m.innerText = "Acesso negado ou erro de conexão.";
                m.style.display = "block";
            });
        }
    </script>
</body>
</html>
