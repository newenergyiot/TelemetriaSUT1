<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewEnergy | Painel Cliente</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark:#0b0f1b; --card-bg:#161b2d; --accent:#00d2ff; --accent-hover:#0099cc; --text-main:#fff; --text-muted:#8fa3c6;
}
body {margin:0;font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text-main);display:flex;flex-direction:column;align-items:center;min-height:100vh;}
header{width:100%;padding:20px;background:var(--card-bg);text-align:center;font-size:24px;font-weight:800;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;}
.card{background:var(--card-bg);padding:30px;border-radius:20px;text-align:center;width:300px;box-shadow:0 10px 20px rgba(0,0,0,0.3);}
.card h2{margin:0 0 10px;}
.card p{margin:5px 0;font-size:18px;}
.button-group{display:flex;gap:10px;justify-content:center;margin-top:10px;}
.button-group button{padding:10px 20px;background:var(--accent);border:none;border-radius:12px;color:#0b0f1b;cursor:pointer;font-weight:700;transition:0.3s;}
.button-group button:hover{background:var(--accent-hover);}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<header>NewEnergy | Painel Cliente</header>
<main>
  <div class="card">
    <h2>Dados do Sensor</h2>
    <p>Sensor 1 - Distância: <span id="distancia1">--</span> cm</p>
    <p>Sensor 1 - Temperatura: <span id="temperatura1">--</span> °C</p>
    <p>Sensor 1 - Umidade: <span id="umidade1">--</span> %</p>
    <!-- Adicione mais sensores aqui -->
  </div>

  <div class="button-group">
    <button onclick="window.location.href='historico.html'">Ver Histórico</button>
    <button onclick="logout()">Sair</button>
  </div>
</main>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
  authDomain: "telemetriasut1.firebaseapp.com",
  databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
  projectId: "telemetriasut1",
  storageBucket: "telemetriasut1.firebasestorage.app",
  messagingSenderId: "591416281880",
  appId: "1:591416281880:web:4f9710b6bf1068767fec6d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// Elementos HTML
const distancia1 = document.getElementById("distancia1");
const temperatura1 = document.getElementById("temperatura1");
const umidade1 = document.getElementById("umidade1");

// Redireciona se não estiver logado
auth.onAuthStateChanged(user => {
  if(!user) window.location.href="index.html";
  else listenSensores(user.uid);
});

// Função para escutar sensores do cliente
function listenSensores(uid){
  const sensor1 = db.ref("/clientes/" + uid + "/cliente01");
  sensor1.on("value", snap => {
    const data = snap.val() || {};
    distancia1.textContent = data.dist || "--";
    temperatura1.textContent = data.temp || "--";
    umidade1.textContent = data.hum || "--";
  });
}

// Logout
function logout(){ auth.signOut().then(()=>window.location.href="index.html"); }
</script>
</body>
</html>
