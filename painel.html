<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NewEnergy | Monitoramento Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0b0f1b; --card:#161b2d; --accent:#00d2ff; --text:#fff; }
        body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); padding:20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top:20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .admin-bar { background: rgba(0,210,255,0.1); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; border: 1px solid var(--accent); }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: #0b0f1b; }
    </style>
</head>
<body>

    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <h1 id="boasVindas">Carregando...</h1>
        <button onclick="auth.signOut()" class="btn" style="background:#ff4757; color:#fff">Sair</button>
    </div>

    <div id="painelAdmin" class="admin-bar">
        <strong>Modo Administrador:</strong> 
        <button class="btn" onclick="vincularSensor()">Vincular Sensor a Cliente</button>
        <button class="btn" onclick="gerenciarUsuarios()">Gerenciar Usuários</button>
    </div>

    <div id="containerSensores" class="grid"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
            authDomain: "telemetriasut1.firebaseapp.com",
            databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
            projectId: "telemetriasut1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // O SEU UID MASTER
        const MEU_UID_MASTER = "dAlN5AysNNNTdtOIS1AwS2vbwH92";

        auth.onAuthStateChanged(user => {
            if(!user) { window.location.replace("index.html"); return; }
            
            if(user.uid === MEU_UID_MASTER) {
                document.getElementById("boasVindas").innerText = "Olá, Administrador";
                document.getElementById("painelAdmin").style.display = "block";
                carregarTudoAdmin();
            } else {
                document.getElementById("boasVindas").innerText = "Meus Dispositivos";
                carregarSensoresDoCliente(user.uid);
            }
        });

        // FUNÇÃO DO CLIENTE: Ele só entra na pasta de sensores que o ADMIN autorizou
        function carregarSensoresDoCliente(uid) {
            db.ref(`vinculos/${uid}`).on('value', snap => {
                const container = document.getElementById("containerSensores");
                container.innerHTML = "";
                
                snap.forEach(child => {
                    const sensorID = child.key; // Ex: sensor_01
                    // Agora busca os dados REAIS do sensor
                    db.ref(`sensores/${sensorID}`).on('value', sSnap => {
                        renderizarCard(sensorID, sSnap.val());
                    });
                });
            });
        }

        // FUNÇÃO DO ADMIN: Vê absolutamente todos os sensores
        function carregarTudoAdmin() {
            db.ref('sensores').on('value', snap => {
                const container = document.getElementById("containerSensores");
                container.innerHTML = "";
                snap.forEach(s => renderizarCard(s.key, s.val()));
            });
        }

        function renderizarCard(id, dados) {
            if(!dados) return;
            let card = document.getElementById(`card-${id}`);
            if(!card) {
                card = document.createElement("div");
                card.id = `card-${id}`;
                card.className = "card";
                document.getElementById("containerSensores").appendChild(card);
            }
            card.innerHTML = `
                <h3 style="margin:0">${dados.nome || id}</h3>
                <div style="font-size:30px; font-weight:800; color:var(--accent); margin:15px 0">
                    ${dados.temp}°C | ${dados.hum}%
                </div>
                <button class="btn" style="width:100%; opacity:0.3" onclick="location.href='historico.html?id=${id}'">Histórico</button>
            `;
        }

        // FUNÇÕES DO ADMIN PARA GERENCIAR
        function vincularSensor() {
            const uid = prompt("Cole o UID do Cliente:");
            const sensor = prompt("Cole o ID do Sensor (ex: sensor_01):");
            if(uid && sensor) {
                db.ref(`vinculos/${uid}/${sensor}`).set(true);
                alert("Vinculado com sucesso!");
            }
        }
    </script>
</body>
</html>
