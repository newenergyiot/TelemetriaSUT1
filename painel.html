<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NewEnergy | Painel de Monitoramento</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0b0f1b;
      --card-bg: #161b2d;
      --accent: #00d2ff;
      --text-main: #ffffff;
      --text-muted: #8fa3c6;
    }
    body {
      margin:0;
      font-family:'Inter','Segoe UI',sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
    }
    header {
      background: var(--card-bg);
      padding: 20px;
      text-align: center;
      font-weight: 800;
      font-size: 24px;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .card h2 {
      margin-top: 0;
      font-size: 18px;
    }
    .card p {
      font-size: 16px;
      color: var(--text-main);
    }
    button {
      background: var(--accent);
      color: #0b0f1b;
      border: none;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { opacity: 0.9; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

  <header>NewEnergy | Painel</header>

  <div class="container">
    <div class="card">
      <h2>Dados do Sensor</h2>
      <p>Distância: <span id="distancia">--</span> cm</p>
      <p>Temperatura: <span id="temperatura">--</span> °C</p>
      <p>Umidade: <span id="umidade">--</span> %</p>
    </div>

    <div class="card">
      <h2>Histórico</h2>
      <button onclick="window.location.href='historico.html'">Ver Histórico</button>
    </div>

    <div class="card">
      <h2>Conta</h2>
      <button id="btnLogout">Sair</button>
    </div>
  </div>

  <script>
    // Firebase TelemetriaSUT1
    const firebaseConfig = {
      apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
      authDomain: "telemetriasut1.firebaseapp.com",
      databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
      projectId: "telemetriasut1",
      storageBucket: "telemetriasut1.firebasestorage.app",
      messagingSenderId: "591416281880",
      appId: "1:591416281880:web:4f9710b6bf1068767fec6d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Redireciona se não estiver logado
    auth.onAuthStateChanged(user => {
      if(!user) window.location.href = "index.html";
    });

    // Logout
    const btnLogout = document.getElementById("btnLogout");
    btnLogout.addEventListener("click", () => {
      auth.signOut().then(() => window.location.href = "index.html");
    });

    // Atualiza dados do sensor em tempo real
    const distanciaEl = document.getElementById("distancia");
    const temperaturaEl = document.getElementById("temperatura");
    const umidadeEl = document.getElementById("umidade");

    const sensorRef = db.ref("sensores"); // path dos dados no RTDB

    sensorRef.on("value", snapshot => {
      const data = snapshot.val();
      if(data){
        distanciaEl.textContent = data.distancia ?? "--";
        temperaturaEl.textContent = data.temperatura ?? "--";
        umidadeEl.textContent = data.umidade ?? "--";
      }
    });
  </script>
</body>
</html>
