<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>NewEnergy | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0b0f1b; --card:#161b2d; --accent:#00d2ff; --text:#fff; --danger:#ff4757; }
        body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); padding:20px; }
        .container { max-width: 1100px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .master-zone { background: rgba(0, 210, 255, 0.05); padding: 20px; border-radius: 20px; border: 1px dashed var(--accent); margin-bottom: 30px; display: none; }
        .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .sensor-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .val { font-size: 32px; font-weight: 800; color: var(--accent); }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-master { background: var(--accent); color: #0b0f1b; margin-right: 10px; }
        .btn-off { background: var(--danger); color: white; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #2e374a; background: #0b0f1b; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 id="title">Carregando...</h1>
            <p id="sub" style="color:#8fa3c6; margin:0"></p>
        </div>
        <button class="btn btn-off" onclick="sair()">Sair</button>
    </div>

    <div id="masterZone" class="master-zone">
        <h3 style="margin-top:0">Controle Master (Escala de Clientes)</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-master" onclick="novoCliente()">+ Cadastrar Cliente</button>
            <button class="btn btn-master" onclick="vincularSensor()">+ Vincular Sensor</button>
            <select id="filtroCliente" onchange="trocarVisao(this.value)">
                <option value="todos">Visualizar Todos os Sensores</option>
            </select>
        </div>
    </div>

    <div id="grid" class="sensor-grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
        authDomain: "telemetriasut1.firebaseapp.com",
        databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
        projectId: "telemetriasut1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
        if(!user) { window.location.replace("index.html"); return; }
        document.getElementById("sub").innerText = user.email;
        verificarPermissoes(user.uid);
    });

    function verificarPermissoes(uid) {
        db.ref(`usuarios/${uid}`).on('value', snap => {
            const dados = snap.val();
            if(!dados) return;

            if(dados.status === "bloqueado") {
                alert("ACESSO BLOQUEADO. Entre em contato com o suporte.");
                sair();
                return;
            }

            if(dados.role === "master") {
                renderizarMaster();
            } else {
                renderizarCliente(dados.sensores || []);
            }
        });
    }

    // Visão do Cliente: Vê apenas os sensores dele
    function renderizarCliente(listaIds) {
        document.getElementById("title").innerText = "Meus Sensores";
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        
        if(listaIds.length === 0) grid.innerHTML = "<p>Nenhum sensor vinculado.</p>";

        listaIds.forEach(id => {
            db.ref(`sensores/${id}`).on('value', sSnap => {
                criarOuAtualizarCard(id, sSnap.val());
            });
        });
    }

    // Visão Master: Vê absolutamente tudo
    function renderizarMaster() {
        document.getElementById("title").innerText = "Administração Global";
        document.getElementById("masterZone").style.display = "block";
        
        db.ref('sensores').on('value', snap => {
            document.getElementById("grid").innerHTML = "";
            snap.forEach(child => {
                criarOuAtualizarCard(child.key, child.val());
            });
        });
    }

    function criarOuAtualizarCard(id, data) {
        if(!data) return;
        let card = document.getElementById(`card-${id}`);
        if(!card) {
            card = document.createElement("div");
            card.id = `card-${id}`;
            card.className = "sensor-card";
            document.getElementById("grid").appendChild(card);
        }

        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <strong style="color:var(--accent)">ID: ${id}</strong>
                <span style="font-size:10px; background:#2ed573; padding:3px 8px; border-radius:5px">ATIVO</span>
            </div>
            <h2 style="margin:0 0 20px 0">${data.nome || 'Sensor s/ Nome'}</h2>
            <div style="display:flex; justify-content:space-between">
                <div><small>TEMPERATURA</small><div class="val">${data.temp}°C</div></div>
                <div><small>UMIDADE</small><div class="val">${data.hum}%</div></div>
            </div>
            <button onclick="irHistorico('${id}')" style="width:100%; margin-top:20px; background:transparent; border:1px solid #2e374a; color:white; padding:10px; border-radius:8px; cursor:pointer">Ver Histórico</button>
        `;
    }

    function novoCliente() {
        const email = prompt("E-mail do Cliente:");
        const uid = prompt("UID do Cliente (Pegue no Firebase Auth):");
        if(email && uid) {
            db.ref(`usuarios/${uid}`).set({
                email: email,
                role: "cliente",
                status: "ativo",
                sensores: []
            });
            alert("Cliente cadastrado com sucesso!");
        }
    }

    function vincularSensor() {
        const uid = prompt("UID do Cliente:");
        const sensorId = prompt("ID do Sensor (ex: sensor_01):");
        if(uid && sensorId) {
            db.ref(`usuarios/${uid}/sensores`).once('value', snap => {
                let lista = snap.val() || [];
                if(!lista.includes(sensorId)) {
                    lista.push(sensorId);
                    db.ref(`usuarios/${uid}/sensores`).set(lista);
                    alert("Sensor vinculado!");
                }
            });
        }
    }

    function irHistorico(id) { window.location.href = `historico.html?id=${id}`; }
    function sair() { auth.signOut().then(() => window.location.replace("index.html")); }
</script>
</body>
</html>
