<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewEnergy | Master Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root { --bg-dark:#0b0f1b; --card-bg:#161b2d; --accent:#00d2ff; --text-main:#ffffff; --text-muted:#8fa3c6; --on:#00ff88; --off:#f43f5e; }
  body{ margin:0; font-family:'Inter',sans-serif; background:var(--bg-dark); color:var(--text-main); padding:15px; display:flex; justify-content:center; }
  .card{ background:var(--card-bg); border-radius:28px; padding:30px; width:100%; max-width:900px; border:1px solid rgba(255,255,255,0.08); }
  .header-main{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .btn-logout{ background:var(--off); border:none; padding:8px 15px; border-radius:10px; color:#fff; cursor:pointer; font-weight:700; }
  select, input{ padding:12px; border-radius:10px; border:none; margin-bottom:10px; width:100%; box-sizing:border-box; background: #0b0f1b; color: #fff; }
  button{ padding:12px 20px; border:none; border-radius:12px; font-weight:700; cursor:pointer; background: var(--accent); color: #0b0f1b; transition: 0.3s; }
  .gauges-container{ display:flex; gap:15px; margin: 20px 0; flex-wrap:wrap; }
  .gauge-box{ flex:1; min-width:140px; background:rgba(255,255,255,0.03); padding:20px; border-radius:22px; text-align:center; }
  .g-value{ font-size:22px; font-weight:900; margin-top:10px; }
  #adminPanel{ display:none; flex-direction:column; gap:10px; margin-top:20px; border-top: 1px solid #333; padding-top: 20px; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>
</head>
<body>

<div class="card">
  <div class="header-main">
    <h2>NewEnergy | Master</h2>
    <button class="btn-logout" onclick="auth.signOut()">Sair</button>
  </div>

  <label>Selecionar Cliente:</label>
  <select id="selectCliente"></select>
  
  <div style="display:flex; gap:10px;">
    <button onclick="document.getElementById('adminPanel').style.display='flex'">Configurações</button>
    <button onclick="verHistorico()">Histórico</button>
  </div>

  <div class="gauges-container">
    <div class="gauge-box">
      <div>Temperatura</div>
      <canvas id="gTemp"></canvas>
      <div id="tempVal" class="g-value">--°C</div>
    </div>
    <div class="gauge-box">
      <div>Umidade</div>
      <canvas id="gHum"></canvas>
      <div id="humVal" class="g-value">--%</div>
    </div>
  </div>

  <div id="adminPanel">
    <h3>Alertas e Frequência</h3>
    <input type="number" id="tMax" placeholder="Temp Máxima">
    <input type="email" id="cfgEmail" placeholder="Email para Alertas">
    <button onclick="alert('Configuração salva (Simulado)')">Salvar</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
  authDomain: "telemetriasut1.firebaseapp.com",
  databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
  projectId: "telemetriasut1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let gT, gH, uidSelecionado;

function iniciarGauges(){
  const opt = (col)=>({ angle:0.15, lineWidth:0.2, pointer:{length:0.6, color:'#fff'}, colorStart:col, strokeColor:'#333' });
  gT = new Gauge(document.getElementById("gTemp")).setOptions(opt('#f43f5e')); gT.maxValue=60; gT.set(0);
  gH = new Gauge(document.getElementById("gHum")).setOptions(opt('#00d2ff')); gH.maxValue=100; gH.set(0);
}

function listenSensores(uid){
  uidSelecionado = uid;
  db.ref("/clientes/"+uid+"/dados_atuais").on("value", snap => {
    const d = snap.val() || {temp:0, hum:0};
    gT.set(d.temp); gH.set(d.hum);
    document.getElementById("tempVal").innerText = d.temp + "°C";
    document.getElementById("humVal").innerText = d.hum + "%";
  });
}

function verHistorico(){
  if(!uidSelecionado) return alert("Selecione um cliente");
  window.location.href = "historico.html?uid=" + uidSelecionado;
}

auth.onAuthStateChanged(user => {
  if(!user) window.location.href = "index.html";
  else {
    iniciarGauges();
    db.ref("/clientes").once("value", snap => {
      const sel = document.getElementById("selectCliente");
      snap.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.key; opt.text = c.val().nome || c.key;
        sel.appendChild(opt);
      });
      if(sel.options.length > 0) listenSensores(sel.value);
      sel.onchange = () => listenSensores(sel.value);
    });
  }
});
</script>
</body>
</html>
