<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NewEnergy | Meus Dispositivos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0b0f1b; --card:#161b2d; --accent:#00d2ff; --text:#fff; }
        body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); padding:20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top:20px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .admin-bar { background: rgba(0,210,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 25px; display: none; border: 1px dashed var(--accent); }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: #0b0f1b; }
        .val { font-size: 28px; font-weight: 800; color: var(--accent); margin: 10px 0; }
        .status { font-size: 12px; color: #2ed573; font-weight: bold; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px;">
        <h1 id="txtStatus" style="font-size: 20px;">Verificando acesso...</h1>
        <button onclick="logout()" class="btn" style="background:#ff4757; color:white">Sair</button>
    </div>

    <div id="areaAdmin" class="admin-bar">
        <h3 style="margin-top:0">Painel de Engenharia (Master)</h3>
        <button class="btn" onclick="vincularNovo()">+ Vincular Sensor a Cliente</button>
    </div>

    <div id="listaSensores" class="grid"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7goJGQ7xBeBJX1ABMIkw8W0nyG1FaZG0",
            authDomain: "telemetriasut1.firebaseapp.com",
            databaseURL: "https://telemetriasut1-default-rtdb.firebaseio.com",
            projectId: "telemetriasut1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const MEU_UID_MASTER = "dAlN5AysNNNTdtOIS1AwS2vbwH92"; // Seu ID de administrador

        auth.onAuthStateChanged(user => {
            if(!user) { window.location.href = "index.html"; return; }
            
            if(user.uid === MEU_UID_MASTER) {
                document.getElementById("txtStatus").innerText = "Gestão Master Geral";
                document.getElementById("areaAdmin").style.display = "block";
                carregarTudoMaster();
            } else {
                document.getElementById("txtStatus").innerText = "Meus Dispositivos";
                carregarSensoresCliente(user.uid);
            }
        });

        function carregarSensoresCliente(uid) {
            db.ref(`vinculos/${uid}`).on('value', snap => {
                const lista = document.getElementById("listaSensores");
                lista.innerHTML = "";
                if(!snap.exists()) {
                    lista.innerHTML = "<p style='color:#64748b'>Nenhum sensor vinculado a esta conta.</p>";
                    return;
                }
                snap.forEach(child => {
                    const sID = child.key;
                    db.ref(`sensores/${sID}`).on('value', sSnap => renderCard(sID, sSnap.val()));
                });
            });
        }

        function carregarTudoMaster() {
            db.ref('sensores').on('value', snap => {
                document.getElementById("listaSensores").innerHTML = "";
                snap.forEach(s => renderCard(s.key, s.val()));
            });
        }

        function renderCard(id, data) {
            if(!data) return;
            let card = document.getElementById(`c-${id}`);
            if(!card) {
                card = document.createElement("div");
                card.id = `c-${id}`;
                card.className = "card";
                card.onclick = () => window.location.href = `dashboard.html?id=${id}`;
                document.getElementById("listaSensores").appendChild(card);
            }
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <strong>${data.nome || id}</strong>
                    <span class="status">● ONLINE</span>
                </div>
                <div class="val">${data.temp || 0}°C | ${data.hum || 0}%</div>
                <div style="font-size: 10px; color: #64748b">ID: ${id}</div>
            `;
        }

        function vincularNovo() {
            const u = prompt("UID do Cliente (veja no Firebase Auth):"); 
            const s = prompt("ID do Sensor (ex: sensor_01):");
            if(u && s) db.ref(`vinculos/${u}/${s}`).set(true).then(() => alert("Vinculado!"));
        }

        function logout() { auth.signOut().then(() => window.location.href = "index.html"); }
    </script>
</body>
</html>
